<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>班表產生器</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f2f2f7;min-height:100vh}

/* ── Layout ── */
.app{display:flex;flex-direction:column;min-height:100vh;max-width:480px;margin:0 auto;background:#fff}

/* ── Tab bar: iOS segmented control style ── */
.tab-bar{display:flex;padding:6px 10px;gap:4px;background:#ebebeb;position:sticky;top:0;z-index:200}
.tab{flex:1;padding:9px 0;text-align:center;font-size:13px;color:#888;cursor:pointer;border-radius:9px;transition:all .2s;user-select:none;background:transparent}
.tab.active{color:#333;background:#fff;font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.18)}

.page{display:none;padding:14px 14px 8px;overflow-y:auto}
.page.active{display:block}
.sec-label{font-size:11px;font-weight:700;color:#aaa;letter-spacing:.06em;text-transform:uppercase;margin:16px 0 8px}
.sec-label:first-child{margin-top:0}

/* ── Shift card ── */
.shift-card{background:#fafafa;border:1px solid #efefef;border-radius:12px;margin-bottom:10px;overflow:hidden}
.shift-card-top{display:flex;align-items:center;gap:8px;padding:10px 12px}
.color-dot{width:34px;height:34px;border-radius:50%;border:2.5px solid rgba(0,0,0,.12);flex-shrink:0;position:relative;cursor:pointer;overflow:hidden}
.color-dot input[type=color]{position:absolute;width:250%;height:250%;top:-75%;left:-75%;border:none;padding:0;cursor:pointer;opacity:0}
.shift-name-input{flex:1;font-size:14px;font-weight:700;background:none;border:none;outline:none;color:#222;min-width:0}
.shift-card-extra{padding:0 12px 12px;display:flex;flex-direction:column;gap:8px}
.time-row{display:flex;align-items:center;gap:8px}
.time-row label{font-size:12px;color:#888;white-space:nowrap;width:32px}
.time-input{flex:1;font-size:12px;padding:5px 8px;border:1px solid #e0e0e0;border-radius:8px;background:#fff;color:#333;outline:none;text-align:center}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding-top:2px}
.toggle-row label{font-size:13px;color:#555}
.toggle{position:relative;width:42px;height:24px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:#ccc;border-radius:12px;cursor:pointer;transition:.2s}
.toggle-slider:before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
.toggle input:checked+.toggle-slider{background:#06C755}
.toggle input:checked+.toggle-slider:before{transform:translateX(18px)}
.del-btn{width:28px;height:28px;border:none;background:none;color:#ccc;cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;line-height:1}
.del-btn:active{background:#fee;color:#e05555}
.add-btn{width:100%;padding:11px;font-size:14px;border:1.5px dashed #ddd;background:none;border-radius:12px;cursor:pointer;color:#aaa;display:flex;align-items:center;justify-content:center;gap:6px}
.add-btn:active{background:#f5f5f5}

/* ── Background tab ── */
.color-swatch-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
.color-swatch{aspect-ratio:1;border-radius:12px;cursor:pointer;border:2.5px solid transparent;position:relative;transition:transform .1s,border-color .15s;overflow:hidden}
.color-swatch.active{border-color:#06C755;transform:scale(1.07)}
.color-swatch:active{transform:scale(.93)}
.color-swatch.palette-swatch{display:flex;align-items:center;justify-content:center;background:conic-gradient(red,yellow,lime,aqua,blue,magenta,red)}
.color-swatch.palette-swatch input[type=color]{position:absolute;width:100%;height:100%;opacity:0;cursor:pointer}
.upload-row{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#fafafa;border-radius:10px;border:1px solid #efefef;cursor:pointer;margin-bottom:12px}
.upload-row span{font-size:13px;color:#555}
.custom-img-thumb{width:100%;aspect-ratio:16/7;border-radius:10px;object-fit:cover;display:none;margin-bottom:12px;border:2.5px solid transparent;cursor:pointer}
.custom-img-thumb.active{border-color:#06C755}
.opacity-row{display:flex;align-items:center;gap:10px}
.opacity-row label{font-size:13px;color:#555;white-space:nowrap}
.opacity-row input[type=range]{flex:1;accent-color:#06C755;height:4px}
.opacity-row .val{font-size:13px;color:#888;min-width:36px;text-align:right}
.save-bg-btn{width:100%;padding:13px;border-radius:12px;border:none;background:#06C755;cursor:pointer;font-size:14px;font-weight:600;color:#fff;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:20px;margin-bottom:8px;transition:all .15s}
.save-bg-btn:active{background:#05a847;transform:scale(.97)}

/* ── Calendar tab ── */
.cal-title-input{width:100%;text-align:center;font-size:20px;font-weight:700;background:none;border:none;outline:none;color:#222;padding:4px 0 2px}
.cal-title-input::placeholder{color:#ccc;font-weight:400}
.month-nav{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:12px}
.nav-btn{width:32px;height:32px;border:1px solid #ddd;background:#fff;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;color:#555;line-height:1}
.nav-btn:active{background:#f0f0f0}
.month-label{font-size:15px;font-weight:700;color:#222;min-width:120px;text-align:center}

/* ── Calendar wrap (exported area) ── */
.calendar-wrap{border-radius:14px;overflow:hidden;position:relative;margin-bottom:12px}
.cal-bg{position:absolute;inset:0;background-size:cover;background-position:center;z-index:0}
.cal-overlay{position:absolute;inset:0;z-index:1;pointer-events:none}
.cal-inner{position:relative;z-index:2;padding:20px 16px 24px}
.cal-export-title{text-align:center;font-size:18px;font-weight:700;color:#222;min-height:24px;padding-bottom:4px;word-break:break-all}
.cal-export-month{text-align:center;font-size:13px;color:#555;margin-bottom:10px;font-weight:600}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.day-header{text-align:center;font-size:10px;font-weight:700;color:#999;padding:3px 0}
.day-header.sun{color:#e05555}.day-header.sat{color:#5580e0}
.day-cell{min-height:54px;border-radius:7px;padding:4px 3px;cursor:pointer;border:1px solid rgba(0,0,0,.06);background:rgba(255,255,255,.65);transition:transform .1s}
.day-cell:active{transform:scale(.93)}
.day-cell.empty{background:transparent!important;border-color:transparent!important;cursor:default}
.day-cell.empty:active{transform:none}
.day-num{font-size:11px;font-weight:700;color:#333;line-height:1.2}
.day-num.sun{color:#e05555}.day-num.sat{color:#5580e0}
.day-num.today{background:#06C755;color:#fff;width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px}
.shift-badge{display:block;font-size:9px;font-weight:700;padding:2px 3px;border-radius:4px;margin-top:2px;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.3}
.shift-time{display:block;font-size:8px;color:rgba(255,255,255,.9);line-height:1.2;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.legend{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;padding:0 2px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:#555}
.legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}

/* ── Description inside export area ── */
.desc-export{display:none;border-top:1px solid rgba(0,0,0,.08);margin-top:10px;padding:8px 2px 2px;font-size:12px;color:#444;line-height:1.7;white-space:pre-wrap;word-break:break-all;outline:none;cursor:text}
.desc-export.visible{display:block}

/* ── "+ 備註" button (outside export area) ── */
.desc-add-wrap{padding:0 0 10px}
.desc-add-btn{display:inline-flex;align-items:center;gap:5px;font-size:13px;color:#bbb;cursor:pointer;padding:4px 2px;user-select:none}
.desc-add-btn:active{color:#888}

/* ── Action buttons ── */
.action-row{display:flex;gap:10px;padding:4px 14px 20px}
.action-btn{flex:1;padding:13px;border-radius:12px;border:1.5px solid #ddd;background:#fff;cursor:pointer;font-size:14px;font-weight:600;color:#333;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s}
.action-btn:active{transform:scale(.97);background:#f5f5f5}
.action-btn.primary{background:#06C755;border-color:#06C755;color:#fff}
.action-btn.primary:active{background:#05a847}

/* ── Shift picker sheet ── */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;display:none}
.sheet-overlay.open{display:block}
.sheet{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:480px;background:#fff;border-radius:20px 20px 0 0;z-index:501;transition:transform .3s cubic-bezier(.32,.72,0,1);max-height:75vh;overflow-y:auto}
.sheet.open{transform:translateX(-50%) translateY(0)}
.sheet-handle{width:36px;height:4px;background:#ddd;border-radius:2px;margin:12px auto 6px}
.sheet-title{font-size:13px;color:#aaa;text-align:center;margin-bottom:10px;font-weight:600}
.sheet-item{display:flex;align-items:center;gap:12px;padding:13px 20px;cursor:pointer}
.sheet-item:active{background:#f5f5f5}
.sheet-dot{width:15px;height:15px;border-radius:50%;flex-shrink:0}
.sheet-item-name{font-size:15px;color:#222}
.sheet-item-time{font-size:11px;color:#aaa;margin-left:auto}
.sheet-clear{display:flex;align-items:center;gap:12px;padding:13px 20px;cursor:pointer;color:#e05555;font-size:15px}
.sheet-clear:active{background:#fff5f5}
.sheet-divider{height:1px;background:#f2f2f2;margin:0 20px}

/* ── Toast & Loading ── */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);color:#fff;padding:10px 22px;border-radius:22px;font-size:13px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
.toast.show{opacity:1}
.loading{position:fixed;inset:0;background:rgba(255,255,255,.92);z-index:9999;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.loading.show{display:flex}
.spinner{width:38px;height:38px;border:3px solid #e0e0e0;border-top-color:#06C755;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{font-size:14px;color:#666}
</style>
</head>
<body>
<div class="app">

  <!-- Tab bar -->
  <div class="tab-bar">
    <div class="tab active" data-tab="calendar" onclick="switchTab('calendar')">班表</div>
    <div class="tab" data-tab="shifts" onclick="switchTab('shifts')">班別</div>
    <div class="tab" data-tab="background" onclick="switchTab('background')">背景</div>
  </div>

  <!-- ══ Tab: Calendar ══ -->
  <div class="page active" id="tab-calendar">
    <input class="cal-title-input" id="calTitleInput" type="text"
      placeholder="點此輸入班表標題（可選）" maxlength="20"
      oninput="onTitleInput(this.value)">

    <div class="month-nav">
      <button class="nav-btn" onclick="changeMonth(-1)">&#8249;</button>
      <div class="month-label" id="monthLabel"></div>
      <button class="nav-btn" onclick="changeMonth(1)">&#8250;</button>
    </div>

    <!-- Exported area -->
    <div class="calendar-wrap" id="calWrap">
      <div class="cal-bg" id="calBg"></div>
      <div class="cal-overlay" id="calOverlay"></div>
      <div class="cal-inner">
        <div class="cal-export-title" id="calExportTitle"></div>
        <div class="cal-export-month" id="calExportMonth"></div>
        <div class="cal-grid" id="calGrid"></div>
        <div class="legend" id="legend"></div>
        <!-- Description inside export, hidden when empty -->
        <div class="desc-export" id="descExport"
          contenteditable="true"
          oninput="onDescInput(this)"
          onblur="onDescBlur(this)"></div>
      </div>
    </div>

    <!-- Add note button, shown when description is empty -->
    <div class="desc-add-wrap">
      <div class="desc-add-btn" id="descAddBtn" onclick="showDesc()">+ 新增備註</div>
    </div>
  </div>

  <!-- Action buttons: calendar tab only -->
  <div class="action-row" id="actionRow">
    <button class="action-btn" onclick="downloadImg()">&#8595; 下載圖片</button>
    <button class="action-btn primary" onclick="shareImg()">分享至 LINE</button>
  </div>

  <!-- ══ Tab: Shifts ══ -->
  <div class="page" id="tab-shifts">
    <div class="sec-label">班別設定</div>
    <div id="shiftList"></div>
    <button class="add-btn" onclick="addShift()">+ 新增班別</button>
  </div>

  <!-- ══ Tab: Background ══ -->
  <div class="page" id="tab-background">
    <div class="sec-label">選擇背景色彩</div>
    <div class="color-swatch-grid" id="colorSwatchGrid"></div>

    <div class="sec-label">自訂圖片</div>
    <label class="upload-row">
      <span>上傳自訂背景圖片</span>
      <input type="file" id="bgUpload" accept="image/*" style="display:none" onchange="uploadBg(event)">
    </label>
    <img class="custom-img-thumb" id="customImgThumb" alt="自訂背景" onclick="selectCustomImg()">

    <div class="sec-label">遮罩透明度</div>
    <div class="opacity-row">
      <label>遮罩</label>
      <input type="range" min="0" max="95" value="0" id="bgOpacityRange" oninput="onOpacityInput(this.value)">
      <span class="val" id="opacityVal">0%</span>
    </div>
    <p style="font-size:11px;color:#aaa;margin-top:8px">數值越高背景越淡，文字越清晰</p>

    <button class="save-bg-btn" onclick="saveBg()">儲存背景設定</button>
  </div>

</div>

<!-- Shift picker sheet -->
<div class="sheet-overlay" id="sheetOverlay" onclick="closeSheet()"></div>
<div class="sheet" id="pickerSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">選擇班別</div>
  <div id="sheetItems"></div>
</div>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <p id="loadingMsg">產生圖片中...</p>
</div>
<div class="toast" id="toast"></div>

<script>
/* ═══ Config ═══ */
const LIFF_ID = '2010387352-Pctemfzt';

/* ═══ Preset bg colors (light blue first = default) ═══ */
const PRESET_COLORS = [
  '#E3F2FD','#FFFFFF','#F0F4FF','#E8F8F5',
  '#FFF8E1','#FDEDEC','#F4ECF7','#F1F8E9',
  '#FCE4EC','#FFF3E0','#263238','#1A1A2E',
];

/* ═══ LocalStorage helpers ═══ */
const LS = {
  get(k, def) {
    try { var v = localStorage.getItem(k); return v !== null ? JSON.parse(v) : def; }
    catch(e) { return def; }
  },
  set(k, v) {
    try { localStorage.setItem(k, JSON.stringify(v)); }
    catch(e) { console.warn('localStorage quota:', e); }
  },
};

/* ═══ Default shifts ═══ */
var DEFAULT_SHIFTS = [
  { id:0, name:'早班',     color:'#4CAF8C', timeStart:'08:00', timeEnd:'16:00', showTime:true  },
  { id:1, name:'中班',     color:'#F4A52A', timeStart:'12:00', timeEnd:'20:00', showTime:true  },
  { id:2, name:'晚班',     color:'#6B7FD4', timeStart:'16:00', timeEnd:'00:00', showTime:true  },
  { id:3, name:'假日早班', color:'#E17A5A', timeStart:'08:00', timeEnd:'16:00', showTime:false },
  { id:4, name:'假日晚班', color:'#AA5FD4', timeStart:'16:00', timeEnd:'00:00', showTime:false },
  { id:5, name:'小夜班',   color:'#5BB5E0', timeStart:'15:00', timeEnd:'23:00', showTime:true  },
  { id:6, name:'大夜班',   color:'#3D5A8A', timeStart:'23:00', timeEnd:'07:00', showTime:true  },
  { id:7, name:'休假',     color:'#9E9E9E', timeStart:'',      timeEnd:'',      showTime:false },
];

/* ═══ Global state ═══ */
var shifts    = LS.get('smk_shifts', null) || DEFAULT_SHIFTS.map(function(s){ return Object.assign({},s); });
var idCounter = shifts.length > 0 ? Math.max.apply(null, shifts.map(function(s){ return s.id; })) + 1 : 8;
var calTitle  = LS.get('smk_title', '');
var curYear, curMonth;
var schedule  = {};
var bgTab     = { type:'color', color:'#E3F2FD', customUrl:null, opacity:0 };

/* ═══ Per-month data ═══ */
function monthKey() {
  return curYear + '-' + String(curMonth + 1).padStart(2, '0');
}

function getMonthData() {
  return LS.get('smk_month_' + monthKey(), {
    schedule: {}, bgType:'color', bgColor:'#E3F2FD',
    bgCustomUrl:null, bgOpacity:0, description:'',
  });
}

function patchMonthData(patch) {
  var data = getMonthData();
  Object.assign(data, patch);
  LS.set('smk_month_' + monthKey(), data);
}

function loadMonth() {
  var data = getMonthData();
  schedule = Object.assign({}, data.schedule || {});
  bgTab.type      = data.bgType      || 'color';
  bgTab.color     = data.bgColor     || '#E3F2FD';
  bgTab.customUrl = data.bgCustomUrl || null;
  bgTab.opacity   = data.bgOpacity   !== undefined ? data.bgOpacity : 0;
  applyBgFromState(bgTab);
  setDescValue(data.description || '');
}

/* ═══ Init ═══ */
function init() {
  var now = new Date();
  curYear  = now.getFullYear();
  curMonth = now.getMonth();
  var ti = document.getElementById('calTitleInput');
  if (ti) ti.value = calTitle;
  renderShifts();
  renderBgTab();
  loadMonth();
  buildCalendar();
}

/* ═══ Tabs ═══ */
function currentTabName() {
  var a = document.querySelector('.tab.active');
  return a ? a.dataset.tab : '';
}

function switchTab(name) {
  var prev = currentTabName();
  if (prev === 'background' && name !== 'background') {
    var data = getMonthData();
    bgTab.type      = data.bgType      || 'color';
    bgTab.color     = data.bgColor     || '#E3F2FD';
    bgTab.customUrl = data.bgCustomUrl || null;
    bgTab.opacity   = data.bgOpacity   !== undefined ? data.bgOpacity : 0;
    applyBgFromState(bgTab);
  }
  if (name === 'background') {
    var data2 = getMonthData();
    bgTab.type      = data2.bgType      || 'color';
    bgTab.color     = data2.bgColor     || '#E3F2FD';
    bgTab.customUrl = data2.bgCustomUrl || null;
    bgTab.opacity   = data2.bgOpacity   !== undefined ? data2.bgOpacity : 0;
    renderBgTab();
    applyBgFromState(bgTab);
  }
  document.getElementById('actionRow').style.display = name === 'calendar' ? 'flex' : 'none';
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.toggle('active', t.dataset.tab === name); });
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  document.getElementById('tab-' + name).classList.add('active');
}

/* ═══ Title ═══ */
function onTitleInput(v) {
  calTitle = v;
  LS.set('smk_title', calTitle);
  document.getElementById('calExportTitle').textContent = v;
}

/* ═══ Description ═══ */
function setDescValue(text) {
  var el  = document.getElementById('descExport');
  var btn = document.getElementById('descAddBtn');
  el.textContent = text;
  var has = text.trim().length > 0;
  el.classList.toggle('visible', has);
  btn.style.display = has ? 'none' : 'inline-flex';
}

function showDesc() {
  var el  = document.getElementById('descExport');
  var btn = document.getElementById('descAddBtn');
  el.classList.add('visible');
  btn.style.display = 'none';
  setTimeout(function(){ el.focus(); }, 50);
}

function onDescInput(el) {
  patchMonthData({ description: el.textContent });
}

function onDescBlur(el) {
  if (el.textContent.trim() === '') {
    el.classList.remove('visible');
    el.textContent = '';
    document.getElementById('descAddBtn').style.display = 'inline-flex';
    patchMonthData({ description: '' });
  }
}

/* ═══ Shifts ═══ */
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderShifts() {
  var el = document.getElementById('shiftList');
  el.innerHTML = '';
  shifts.forEach(function(s) {
    var card = document.createElement('div');
    card.className = 'shift-card';
    card.innerHTML =
      '<div class="shift-card-top">' +
        '<div class="color-dot" id="dot-' + s.id + '" style="background:' + s.color + '">' +
          '<input type="color" value="' + s.color + '"' +
            ' oninput="changeColor(' + s.id + ',this.value)"' +
            ' onchange="changeColor(' + s.id + ',this.value)">' +
        '</div>' +
        '<input class="shift-name-input" type="text" value="' + escHtml(s.name) + '" maxlength="8"' +
          ' oninput="renameShift(' + s.id + ',this.value)">' +
        '<button class="del-btn" onclick="deleteShift(' + s.id + ')">&#215;</button>' +
      '</div>' +
      '<div class="shift-card-extra">' +
        '<div class="time-row">' +
          '<label>上班</label>' +
          '<input class="time-input" type="time" value="' + s.timeStart + '"' +
            ' onchange="changeTime(' + s.id + ',\'start\',this.value)">' +
          '<label style="width:16px;text-align:center;color:#ccc">&#8212;</label>' +
          '<label>下班</label>' +
          '<input class="time-input" type="time" value="' + s.timeEnd + '"' +
            ' onchange="changeTime(' + s.id + ',\'end\',this.value)">' +
        '</div>' +
        '<div class="toggle-row">' +
          '<label>在月曆上顯示時間</label>' +
          '<label class="toggle">' +
            '<input type="checkbox" ' + (s.showTime ? 'checked' : '') +
              ' onchange="changeShowTime(' + s.id + ',this.checked)">' +
            '<span class="toggle-slider"></span>' +
          '</label>' +
        '</div>' +
      '</div>';
    el.appendChild(card);
  });
  LS.set('smk_shifts', shifts);
}

function addShift() {
  var colors = ['#4CAF8C','#F4A52A','#6B7FD4','#E17A5A','#AA5FD4','#5BB5E0','#E05B9A','#8BC34A'];
  shifts.push({ id:idCounter, name:'新班別', color:colors[idCounter % colors.length],
    timeStart:'', timeEnd:'', showTime:false });
  idCounter++;
  renderShifts(); buildCalendar();
}

function deleteShift(id) {
  shifts = shifts.filter(function(s){ return s.id !== id; });
  Object.keys(schedule).forEach(function(k){ if (schedule[k] === id) delete schedule[k]; });
  renderShifts();
  patchMonthData({ schedule: Object.assign({}, schedule) });
  buildCalendar();
}

function renameShift(id, name) {
  var s = shifts.find(function(s){ return s.id === id; });
  if (s) s.name = name;
  LS.set('smk_shifts', shifts);
  buildCalendar();
}

function changeColor(id, color) {
  var s = shifts.find(function(s){ return s.id === id; });
  if (!s) return;
  s.color = color;
  var dot = document.getElementById('dot-' + id);
  if (dot) dot.style.background = color;
  LS.set('smk_shifts', shifts);
  buildCalendar();
}

function changeTime(id, which, val) {
  var s = shifts.find(function(s){ return s.id === id; });
  if (!s) return;
  if (which === 'start') s.timeStart = val; else s.timeEnd = val;
  LS.set('smk_shifts', shifts);
  buildCalendar();
}

function changeShowTime(id, checked) {
  var s = shifts.find(function(s){ return s.id === id; });
  if (s) s.showTime = checked;
  LS.set('smk_shifts', shifts);
  buildCalendar();
}

/* ═══ Background ═══ */
function applyBgFromState(state) {
  var bgEl      = document.getElementById('calBg');
  var overlayEl = document.getElementById('calOverlay');
  var opacity   = state.opacity !== undefined ? state.opacity : 0;

  if (state.type === 'custom' && state.customUrl) {
    bgEl.style.background         = '';
    bgEl.style.backgroundImage    = 'url(' + state.customUrl + ')';
    bgEl.style.backgroundSize     = 'cover';
    bgEl.style.backgroundPosition = 'center';
  } else {
    bgEl.style.backgroundImage = 'none';
    bgEl.style.background      = state.color || '#E3F2FD';
  }
  overlayEl.style.background = opacity > 0 ? 'rgba(255,255,255,' + opacity + ')' : 'none';
}

function renderBgTab() {
  var grid = document.getElementById('colorSwatchGrid');
  grid.innerHTML = '';

  PRESET_COLORS.forEach(function(color) {
    var div = document.createElement('div');
    var isActive = bgTab.type === 'color' && bgTab.color === color;
    div.className = 'color-swatch' + (isActive ? ' active' : '');
    div.style.background = color;
    if (color === '#FFFFFF') div.style.boxShadow = 'inset 0 0 0 1px #ddd';
    div.onclick = (function(c){ return function(){
      bgTab.type = 'color'; bgTab.color = c; renderBgTab(); applyBgFromState(bgTab);
    }; })(color);
    grid.appendChild(div);
  });

  /* Custom color picker swatch */
  var paletteDiv = document.createElement('div');
  var isPaletteActive = bgTab.type === 'color' && PRESET_COLORS.indexOf(bgTab.color) === -1;
  paletteDiv.className = 'color-swatch palette-swatch' + (isPaletteActive ? ' active' : '');
  paletteDiv.title = '自訂顏色';
  var colorInput = document.createElement('input');
  colorInput.type = 'color';
  colorInput.value = isPaletteActive ? bgTab.color : '#888888';
  colorInput.addEventListener('input', function(e) {
    bgTab.type = 'color'; bgTab.color = e.target.value;
    renderBgTab(); applyBgFromState(bgTab);
  });
  paletteDiv.appendChild(colorInput);
  grid.appendChild(paletteDiv);

  /* Custom image thumbnail */
  var thumb = document.getElementById('customImgThumb');
  if (bgTab.customUrl) {
    thumb.src = bgTab.customUrl;
    thumb.style.display = 'block';
    thumb.classList.toggle('active', bgTab.type === 'custom');
  } else {
    thumb.style.display = 'none';
    thumb.classList.remove('active');
  }

  var pct = Math.round(bgTab.opacity * 100);
  document.getElementById('bgOpacityRange').value = pct;
  document.getElementById('opacityVal').textContent = pct + '%';
}

function selectCustomImg() {
  if (!bgTab.customUrl) return;
  bgTab.type = 'custom';
  renderBgTab(); applyBgFromState(bgTab);
}

function uploadBg(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    bgTab.customUrl = ev.target.result;
    bgTab.type      = 'custom';
    renderBgTab(); applyBgFromState(bgTab);
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

function onOpacityInput(v) {
  bgTab.opacity = v / 100;
  document.getElementById('opacityVal').textContent = v + '%';
  applyBgFromState(bgTab);
}

function saveBg() {
  patchMonthData({
    bgType:bgTab.type, bgColor:bgTab.color,
    bgCustomUrl:bgTab.customUrl, bgOpacity:bgTab.opacity,
  });
  showToast('背景已儲存！');
}

/* ═══ Calendar ═══ */
function buildCalendar() {
  var MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  var lbl = curYear + ' 年 ' + MONTHS[curMonth];
  document.getElementById('monthLabel').textContent     = lbl;
  document.getElementById('calExportMonth').textContent = lbl;
  document.getElementById('calExportTitle').textContent = calTitle;

  var today = new Date();
  var grid  = document.getElementById('calGrid');
  grid.innerHTML = '';

  var dayNames = [{l:'日',c:'sun'},{l:'一',c:''},{l:'二',c:''},{l:'三',c:''},
                  {l:'四',c:''},{l:'五',c:''},{l:'六',c:'sat'}];
  dayNames.forEach(function(d) {
    var h = document.createElement('div');
    h.className = 'day-header ' + d.c;
    h.textContent = d.l;
    grid.appendChild(h);
  });

  var firstDay    = new Date(curYear, curMonth, 1).getDay();
  var daysInMonth = new Date(curYear, curMonth + 1, 0).getDate();

  for (var i = 0; i < firstDay; i++) {
    var e = document.createElement('div'); e.className = 'day-cell empty'; grid.appendChild(e);
  }

  for (var d = 1; d <= daysInMonth; d++) {
    var cell  = document.createElement('div');
    cell.className = 'day-cell';
    var key   = curYear + '-' + curMonth + '-' + d;
    var sid   = schedule[key];
    var shift = sid !== undefined ? shifts.find(function(s){ return s.id === sid; }) : null;
    var dow   = new Date(curYear, curMonth, d).getDay();
    var isTod = today.getFullYear()===curYear && today.getMonth()===curMonth && today.getDate()===d;

    if (shift) {
      cell.style.background  = shift.color + '30';
      cell.style.borderColor = shift.color + '70';
    }

    var nc = 'day-num' + (dow===0?' sun':dow===6?' sat':'');
    var inner = isTod ? '<div class="day-num today">' + d + '</div>' : '<div class="' + nc + '">' + d + '</div>';

    if (shift) {
      inner += '<span class="shift-badge" style="background:' + shift.color + '">' + escHtml(shift.name) + '</span>';
      if (shift.showTime && (shift.timeStart || shift.timeEnd)) {
        var t = [shift.timeStart, shift.timeEnd].filter(Boolean).join('-');
        inner += '<span class="shift-time" style="color:' + shift.color + 'cc">' + t + '</span>';
      }
    }

    cell.innerHTML = inner;
    (function(k){ cell.addEventListener('click', function(){ openPicker(k); }); })(key);
    grid.appendChild(cell);
  }

  renderLegend();
  applyBgFromState(bgTab);
}

function changeMonth(delta) {
  patchMonthData({ schedule: Object.assign({}, schedule) });
  curMonth += delta;
  if (curMonth < 0)  { curMonth = 11; curYear--; }
  if (curMonth > 11) { curMonth = 0;  curYear++; }
  loadMonth();
  buildCalendar();
}

function renderLegend() {
  var leg = document.getElementById('legend');
  leg.innerHTML = '';
  var used = {};
  Object.values(schedule).forEach(function(v){ used[v] = true; });
  shifts.forEach(function(s) {
    if (!used[s.id]) return;
    var item = document.createElement('div');
    item.className = 'legend-item';
    var txt = s.name;
    if (s.timeStart || s.timeEnd) txt += ' ' + [s.timeStart, s.timeEnd].filter(Boolean).join('-');
    item.innerHTML = '<span class="legend-dot" style="background:' + s.color + '"></span><span>' + escHtml(txt) + '</span>';
    leg.appendChild(item);
  });
}

/* ═══ Shift picker ═══ */
function openPicker(key) {
  var items = document.getElementById('sheetItems');
  items.innerHTML = '';
  var clear = document.createElement('div');
  clear.className = 'sheet-clear';
  clear.innerHTML = '<span class="sheet-dot" style="background:#ddd"></span><span>清除</span>';
  clear.onclick = function() {
    delete schedule[key];
    patchMonthData({ schedule: Object.assign({}, schedule) });
    closeSheet(); buildCalendar();
  };
  items.appendChild(clear);
  items.appendChild(mkDiv());

  shifts.forEach(function(s) {
    var item = document.createElement('div');
    item.className = 'sheet-item';
    var sel = schedule[key] === s.id;
    var t   = (s.timeStart || s.timeEnd) ? [s.timeStart, s.timeEnd].filter(Boolean).join('-') : '';
    item.innerHTML =
      '<span class="sheet-dot" style="background:' + s.color + '"></span>' +
      '<span class="sheet-item-name">' + escHtml(s.name) + '</span>' +
      (t ? '<span class="sheet-item-time">' + t + '</span>' : '') +
      (sel ? '<span style="margin-left:auto;color:#06C755;font-size:18px">&#10003;</span>' : '');
    (function(sid){ item.onclick = function() {
      schedule[key] = sid;
      patchMonthData({ schedule: Object.assign({}, schedule) });
      closeSheet(); buildCalendar();
    }; })(s.id);
    items.appendChild(item);
    items.appendChild(mkDiv());
  });

  document.getElementById('sheetOverlay').classList.add('open');
  document.getElementById('pickerSheet').classList.add('open');
}

function mkDiv() {
  var d = document.createElement('div'); d.className = 'sheet-divider'; return d;
}
function closeSheet() {
  document.getElementById('sheetOverlay').classList.remove('open');
  document.getElementById('pickerSheet').classList.remove('open');
}

/* ═══ Export (canvas) ═══ */
function getCanvas() {
  if (document.activeElement && document.activeElement.blur) document.activeElement.blur();
  showLoading('產生圖片中...');
  return html2canvas(document.getElementById('calWrap'), {
    scale:2.5, useCORS:true, allowTaint:true,
    backgroundColor:'#ffffff', logging:false, imageTimeout:15000,
  }).then(function(canvas) {
    hideLoading(); return canvas;
  }).catch(function(e) {
    hideLoading(); throw e;
  });
}

/* ═══ Download ═══ */
function downloadImg() {
  getCanvas().then(function(canvas) {
    var fname = (calTitle || '班表') + '.png';
    canvas.toBlob(function(blob) {
      var file = new File([blob], fname, { type:'image/png' });
      /* Web Share API — on iOS triggers system share sheet with "Save Image" option */
      if (navigator.share && navigator.canShare && navigator.canShare({ files:[file] })) {
        navigator.share({ files:[file], title:fname }).then(function() {
          showToast('圖片已儲存！');
        }).catch(function(e) {
          if (e.name !== 'AbortError') {
            /* fallback: link download */
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a'); a.download = fname; a.href = url; a.click();
            setTimeout(function(){ URL.revokeObjectURL(url); }, 5000);
            showToast('下載成功！');
          }
        });
      } else {
        /* Desktop: direct download */
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a'); a.download = fname; a.href = url; a.click();
        setTimeout(function(){ URL.revokeObjectURL(url); }, 5000);
        showToast('下載成功！');
      }
    });
  }).catch(function() { showToast('下載失敗，請再試一次'); });
}

/* ═══ Share directly (no sheet) ═══ */
function shareImg() {
  getCanvas().then(function(canvas) {
    var fname = (calTitle || '班表') + '.png';
    canvas.toBlob(function(blob) {
      var file = new File([blob], fname, { type:'image/png' });
      if (navigator.share && navigator.canShare && navigator.canShare({ files:[file] })) {
        navigator.share({ files:[file], title: calTitle || '班表' }).then(function() {
          showToast('分享成功！');
        }).catch(function(e) {
          if (e.name !== 'AbortError') {
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a'); a.download = fname; a.href = url; a.click();
            setTimeout(function(){ URL.revokeObjectURL(url); }, 5000);
            showToast('已下載，請手動傳送至 LINE');
          }
        });
      } else {
        /* Fallback: open in new tab, user can long-press to save/share */
        var url = URL.createObjectURL(blob);
        window.open(url, '_blank');
        setTimeout(function(){ URL.revokeObjectURL(url); }, 30000);
        showToast('請長按圖片後分享至 LINE');
      }
    });
  }).catch(function() { showToast('圖片產生失敗'); });
}

/* ═══ UI helpers ═══ */
function showLoading(msg) {
  document.getElementById('loadingMsg').textContent = msg || '處理中...';
  document.getElementById('loading').classList.add('show');
}
function hideLoading() { document.getElementById('loading').classList.remove('show'); }
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2800);
}

/* ═══ Start ═══ */
init();
</script>
